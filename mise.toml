[settings]
lockfile = true

[env]
CGO_ENABLED = 0

[tools]
dbmate = "2.33.0"
ginkgo = "2.29.0"
"github:a-h/templ" = "0.3.1020"
go = "1.26.4"
"go:github.com/go-jet/jet/v2/cmd/jet" = "2.15.0"
"go:github.com/mickamy/slog-pretty/cmd/spretty" = "0.0.1"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.3.0"
golangci-lint = "2.12.2"
sqlite = "3.53.1"

[tasks."code:test"]
run = "ginkgo -r -p --randomize-all --randomize-suites --fail-on-pending --fail-on-empty --keep-going --trace"

[tasks."code:check"]
run = [
  "golangci-lint run ./...",
  "golangci-lint fmt --diff-colored ./...",
  "govulncheck -test ./...",
]

[tasks."cmd:admin_server"]
run = [
  "rm -rfv cmd/admin_server/.dist",
  "go run -ldflags \"-w -s\" cmd/bundle_assets/main.go -e cmd/admin_server/frontend/*.css -e cmd/admin_server/frontend/*.ts -o cmd/admin_server/.dist",
  "cp --verbose -R cmd/admin_server/frontend/static cmd/admin_server/.dist",
  "touch cmd/admin_server/.dist/.gitkeep",
  "templ generate",
  "go run -ldflags \"-w -s\" cmd/admin_server/main.go",
]

[tasks."cmd:db_migrate"]
run = [
  "dbmate -u 'sqlite:./data/app.db' -d ./internal/store/migrations -s ./internal/store/schema.sql up",
  "go run -ldflags \"-w -s\" cmd/gen_db_types/main.go",
]

[tasks."cmd:fetch_outputs_job"]
run = ["go run -ldflags \"-w -s\" cmd/fetch_outputs_job/main.go"]
